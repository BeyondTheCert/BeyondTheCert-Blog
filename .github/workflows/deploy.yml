name: Build and Deploy Blog

on:
  push:
    branches: [ master ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout blog repo
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/beyondthecert/beyondthecert-blog:latest

      - name: Checkout GitOps repo
        uses: actions/checkout@v4
        with:
          repository: BeyondTheCert/Genesis1-GitOps
          token: ${{ secrets.GITOPS_TOKEN }}
          path: gitops

      - name: Update image tag in GitOps repo
        run: |
          cd gitops
          sed -i 's|image:.*beyondthecert-blog.*|image: ghcr.io/beyondthecert/beyondthecert-blog:latest|' apps/blog/deployment.yaml
          git config user.email "beyondthecertdev@gmail.com"
          git config user.name "BeyondTheCert"
          git add .
          git commit -m "update blog image" || echo "no changes"
          git push
